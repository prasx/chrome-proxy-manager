<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=380" />
<title>Proxy Manager</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="popup-body">

<div class="header">
  <div class="header-left">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
    </div>
    <span class="logo-name">Proxy Manager</span>
  </div>
  <div class="header-actions">
    <button class="header-btn" id="dashboardBtn" title="Панель управления">
      <svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
    </button>
  </div>
</div>

<div class="status-row">
  <span class="status-dot" id="statusDot"></span>
  <span class="status-text" id="statusText">Подключено</span>
  <span id="statusIp" style="font:400 11px/1 var(--font-mono);color:var(--muted);margin-left:auto;"></span>
</div>

<div class="toggle-area">
  <button class="toggle-btn active" id="toggleBtn" aria-label="Переключить прокси">
    <div class="toggle-ring"></div>
    <div class="toggle-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <span class="toggle-label">Вкл</span>
  </button>
</div>

<div class="info-section">
  <div class="info-card" id="proxyInfoCard">
    <div class="info-left">
      <div class="info-location" id="proxyLocation">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span id="proxyName">—</span>
      </div>
      <div class="info-ip" id="proxyAddress">—</div>
    </div>
    <div class="info-right">
      <span class="latency-dot" id="latencyDot"></span>
      <span id="latencyText">—</span>
    </div>
  </div>
</div>

<div class="mode-section">
  <div class="mode-label">Режим работы</div>
  <div class="mode-chips">
    <button class="mode-chip active" data-mode="auto">Авто</button>
    <button class="mode-chip" data-mode="manual">Ручной</button>
  </div>
  <div id="modeHint" style="font:400 11px/1.4 var(--font-body);color:var(--muted);margin-top:6px;padding:0 2px;">Недоступные сайты автоматически добавляются в прокси</div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <div class="stat-value" id="statSessions">0</div>
    <div class="stat-label">Сессий</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statProxy">0</div>
    <div class="stat-label">Через прокси</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statDirect">0</div>
    <div class="stat-label">Напрямую</div>
  </div>
</div>

<div class="proxy-section" style="margin-top:12px;">
  <div class="proxy-section-header">
    <span class="proxy-section-title">Анализ страницы</span>
  </div>
  <button class="btn btn-secondary" id="analyzeBtn" style="width:100%;font-size:12px;">Найти связанные домены</button>
  <div id="relatedDomainsBox" style="display:none;margin-top:8px;"></div>
</div>

<script src="shared.js"></script>
<script src="popup.js"></script>
</body>
</html>
