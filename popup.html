<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🛡️ Proxy Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🛡️ Proxy Manager</h1>
    
    <!-- Вкладки -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="settings">⚙️ Настройки</button>
      <button class="tab-btn" data-tab="logs">📋 Логи</button>
      <div class="tabs-actions">
        <button id="exportConfig" class="icon-btn" title="Экспорт конфигурации">💾</button>
        <button id="importConfig" class="icon-btn" title="Импорт конфигурации">📂</button>
      </div>
    </div>

    <!-- Вкладка Настройки -->
    <div id="settings" class="tab-content active">
    
    <!-- Настройки прокси -->
    <div class="proxy-settings">
      <div class="proxy-header">
        <h3>Прокси серверы</h3>
        <div>
          <button id="testProxy" class="icon-btn" title="Тест подключения">🔍</button>
          <button id="addProxy" class="icon-btn" title="Добавить прокси">➕</button>
        </div>
      </div>
      <div id="proxyTestResult" class="proxy-test-result"></div>
      <div id="proxiesList" class="proxies-list">
        <!-- Список прокси -->
      </div>
    </div>

    <!-- Подвкладки для списков -->
    <div class="subtabs">
      <button class="subtab-btn active" data-subtab="proxylist">🔒 Через прокси</button>
      <button class="subtab-btn" data-subtab="directlist">✅ Напрямую</button>
    </div>

    <!-- Список для прокси -->
    <div id="proxylist" class="subtab-content active">
      <div class="sites-section">
        <div class="sites-header">
          <h3>Сайты через прокси</h3>
          <div>
            <button id="exportProxyList" class="icon-btn" title="Экспорт">💾</button>
            <button id="clearProxyList" class="icon-btn danger" title="Очистить">🗑️</button>
          </div>
        </div>
        
        <div class="add-site">
          <input type="text" id="proxyListValue" placeholder="google.com, *.ru, 2ip.ru">
          <button id="addToProxyList">Добавить</button>
        </div>
        
        <div class="site-hint">
          💡 Эти сайты будут открываться через прокси
        </div>

        <div class="import-list">
          <h4>Импорт списка с URL</h4>
          <div class="import-url-row">
            <input type="text" id="proxyListUrl" placeholder="https://example.com/blocked-sites.txt">
            <button id="importProxyListFromUrl">Загрузить</button>
          </div>
          <div id="proxyImportStatus" class="import-status"></div>
        </div>

        <div class="sites-list" id="proxyListSites">
          <!-- Список будет здесь -->
        </div>
      </div>
    </div>

    <!-- Список для direct -->
    <div id="directlist" class="subtab-content">
      <div class="sites-section">
        <div class="sites-header">
          <h3>Сайты напрямую</h3>
          <div>
            <button id="exportDirectList" class="icon-btn" title="Экспорт">💾</button>
            <button id="clearDirectList" class="icon-btn danger" title="Очистить">🗑️</button>
          </div>
        </div>
        
        <div class="add-site">
          <input type="text" id="directListValue" placeholder="localhost, 127.0.0.1, *.local">
          <button id="addToDirectList">Добавить</button>
        </div>
        
        <div class="site-hint">
          💡 Эти сайты всегда будут открываться напрямую (приоритет выше)
        </div>

        <div class="import-list">
          <h4>Импорт списка с URL</h4>
          <div class="import-url-row">
            <input type="text" id="directListUrl" placeholder="https://example.com/whitelist.txt">
            <button id="importDirectListFromUrl">Загрузить</button>
          </div>
          <div class="quick-links">
            <span>Быстрые ссылки:</span>
            <button class="quick-link-btn" data-url="https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/whitelist.txt">🇷🇺 RU Whitelist</button>
          </div>
          <div id="directImportStatus" class="import-status"></div>
        </div>

        <div class="sites-list" id="directListSites">
          <!-- Список будет здесь -->
        </div>
      </div>
    </div>
    </div>
    <!-- Конец вкладки Настройки -->

    <!-- Вкладка Логи -->
    <div id="logs" class="tab-content">
      <div class="logs-section">
        <div class="logs-header">
          <h3>Логи маршрутизации</h3>
          <div class="logs-controls">
            <select id="logFilter" class="log-filter">
              <option value="all">Все</option>
              <option value="PROXY">Только PROXY</option>
              <option value="DIRECT">Только DIRECT</option>
              <option value="CONFIG">Конфигурация</option>
              <option value="ERROR">Ошибки</option>
            </select>
            <button id="clearLogs" class="icon-btn danger" title="Очистить логи">🗑️</button>
          </div>
        </div>
        <div class="logs-table-container">
          <table class="logs-table">
            <thead>
              <tr>
                <th>Время</th>
                <th>Тип</th>
                <th>Домен</th>
                <th>Маршрут</th>
                <th>Правило</th>
              </tr>
            </thead>
            <tbody id="logsTableBody">
              <!-- Логи будут здесь -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <!-- Конец вкладки Логи -->
  </div>

  <input type="file" id="importFile" style="display:none" accept=".json">
  <input type="file" id="importConfigFile" style="display:none" accept=".json">
  <script src="popup.js"></script>
</body>
</html>
